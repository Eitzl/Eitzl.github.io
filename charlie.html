  <style>
    .photo-grid {
      display: grid;

      margin: 0;
    }

    .photo-grid img {
      width: 100%;
      border-radius: 6px;
      border: 1px solid var(--border);
      display: block;
    }

    .photo-grid figcaption {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 0.35rem;
    }
  </style>
</head>
